# Liquidación-de-sueldo line-item lexicon.
#
# Authored here; compiled at build time by `tests/compile-lexicon.ts` (a
# devDep `js-yaml` consumer wired as `prebuild`) into
# `liquidacion-lexicon.generated.ts`. Runtime imports the generated TS
# sibling; this file is never read at runtime. CI fails if the generated
# file diverges from this YAML.
#
# Each item describes a canonical concept, not a string replacement. Aliases
# cover accented + unaccented forms, common employer abbreviations, and
# known short forms. The matcher keys on `{ section, normalizeLabel(alias) }`
# (see `src/normalize.ts`) so accent / case / punctuation variants collapse
# automatically — we do not need to enumerate every casing.
#
# `classification` is allowed only when the concept is stable enough to
# bypass a Gemini arbiter call. `legalType` is allowed only when
# `naturaleza === 'Legal'` (validator enforces this).

version: 1
doctype: liquidaciones-sueldo
itemTypes:
  - income
  - deduction

