    # old renta classifier (CLASSIFY_SCHEMA_VERSION = 4) grouped AFP-labeled
    # deductions under Legal/afp, and `app/reports/situacion/reliquidacion.ts`
    # accumulates `Legal + legalType=afp` into `cotizPreviReal`. Changing
    # this to `Otro` would silently change RF/RV math at cutover — see the
    # plan's Decisions section.
